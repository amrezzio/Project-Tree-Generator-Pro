name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v1.0.1, etc.

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        python -m PyInstaller --clean --onedir --windowed `
          --icon=src/app_icon.ico `
          --version-file=version.txt `
          --add-data "src/app_icon.ico;." `
          --add-data "src/translations;translations" `
          --add-data "src/fonts;fonts" `
          src/main.py

    - name: Install Inno Setup
      run: |
        choco install innosetup -y

    - name: Build Installer with Inno Setup
      run: |
        iscc setup.iss

    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $env:GITHUB_OUTPUT

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: Release/ProjectTreeGeneratorPro_Setup.exe
        name: Release ${{ steps.get_version.outputs.VERSION }}
        body: |
          ## What's New
          
          See commit history for details.
          
          ## Installation
          
          1. Download `ProjectTreeGeneratorPro_Setup.exe`
          2. Run the installer
          3. Launch from Start Menu or Desktop shortcut
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}